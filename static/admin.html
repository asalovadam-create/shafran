<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SHAFRAN · admin</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0b0a08;color:#f5efe4;font-family:-apple-system,sans-serif;padding:20px;}
  .card{width:100%;max-width:420px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:24px;padding:28px;backdrop-filter:blur(20px);}
  h1{font-size:20px;margin:0 0 6px;}
  p{color:#a79a87;font-size:13px;line-height:1.5;margin:0 0 18px;}
  label{display:block;font-size:12px;color:#a79a87;margin:14px 0 6px;text-transform:uppercase;letter-spacing:.05em;}
  input{width:100%;padding:12px 14px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
    background:rgba(255,255,255,.07);color:#f5efe4;font-size:15px;box-sizing:border-box;}
  button{width:100%;margin-top:16px;padding:13px;border:none;border-radius:14px;font-weight:600;
    background:linear-gradient(135deg,#e8a33d,#c9791b);color:#1c1305;cursor:pointer;font-size:15px;}
  button.secondary{background:rgba(255,255,255,.1);color:#f5efe4;}
  #log{margin-top:16px;font-size:12px;color:#a79a87;white-space:pre-wrap;word-break:break-word;}
  table{width:100%;border-collapse:collapse;margin-top:14px;font-size:12px;}
  td,th{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;}
  .hidden{display:none;}
  a{color:#e8a33d;}
</style>
</head>
<body>
<div class="card">
  <h1>SHAFRAN · панель администратора</h1>
  <p>Один и тот же вход для всех — войдите номером <b>admin</b> и паролем от админ-аккаунта, как и на главном сайте.</p>

  <div id="loginBox">
    <label>Логин</label>
    <input id="loginInput" type="text" placeholder="admin" autocomplete="off">
    <label>Пароль</label>
    <input id="passwordInput" type="password" placeholder="••••">
    <button id="loginBtn">Войти</button>
    <div id="log"></div>
  </div>

  <div id="panelBox" class="hidden">
    <label>Секунд до старта выдачи номеров</label>
    <input id="seconds" type="number" value="60" min="1">
    <button id="startBtn">Запустить таймер для всех</button>
    <button id="resetBtn" class="secondary">Сбросить (новый забег)</button>
    <button id="statsBtn" class="secondary">Показать статистику</button>
    <button id="logoutBtn" class="secondary">Выйти</button>
    <div id="log2"></div>
    <div id="statsBox"></div>
  </div>
</div>

<script>
const TOKEN_KEY = "shafran_token";
let token = localStorage.getItem(TOKEN_KEY);

const loginBox = document.getElementById("loginBox");
const panelBox = document.getElementById("panelBox");
const log = (t) => document.getElementById("log").textContent = t;
const log2 = (t) => document.getElementById("log2").textContent = t;

async function tryEnterPanel() {
  if (!token) return false;
  const res = await fetch("/api/me?token=" + encodeURIComponent(token));
  if (!res.ok) return false;
  const me = await res.json();
  if (!me.is_admin) { log("Этот аккаунт не администратор."); return false; }
  loginBox.classList.add("hidden");
  panelBox.classList.remove("hidden");
  return true;
}

document.getElementById("loginBtn").onclick = async () => {
  const login = document.getElementById("loginInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  log("Входим…");
  try {
    const res = await fetch("/api/login", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ login, password })
    });
    const data = await res.json();
    if (!res.ok) { log(data.detail || "Ошибка входа"); return; }
    if (!data.is_admin) { log("Этот аккаунт не администратор."); return; }
    token = data.token;
    localStorage.setItem(TOKEN_KEY, token);
    loginBox.classList.add("hidden");
    panelBox.classList.remove("hidden");
  } catch { log("Не удалось связаться с сервером"); }
};

document.getElementById("startBtn").onclick = async () => {
  const seconds = Number(document.getElementById("seconds").value);
  const res = await fetch("/api/admin/timer", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token, seconds })
  });
  const data = await res.json();
  log2(res.ok ? "Таймер запущен, окончание: " + data.timer_end : "Ошибка: " + data.detail);
};

document.getElementById("resetBtn").onclick = async () => {
  const res = await fetch("/api/admin/reset", {
    method: "POST", headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ token, wipe_users: false })
  });
  const data = await res.json();
  log2(res.ok ? "Сброшено. Можно запускать новый забег." : "Ошибка: " + data.detail);
};

document.getElementById("statsBtn").onclick = async () => {
  const res = await fetch("/api/admin/stats?token=" + encodeURIComponent(token));
  const data = await res.json();
  if (!res.ok) { log2("Ошибка: " + data.detail); return; }
  log2(`Следующий номер: ${data.next_number} · Всего участников: ${data.users.length}`);
  const rows = data.users.map(u =>
    `<tr><td>${u.queue_number ?? "—"}</td><td>${u.name}</td><td>${u.login}</td></tr>`
  ).join("");
  document.getElementById("statsBox").innerHTML =
    `<table><tr><th>№</th><th>Имя</th><th>Логин</th></tr>${rows}</table>`;
};

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem(TOKEN_KEY);
  token = null;
  panelBox.classList.add("hidden");
  loginBox.classList.remove("hidden");
  log("Вы вышли из панели администратора.");
};

tryEnterPanel();
</script>
</body>
</html>
