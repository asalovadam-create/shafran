<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover">
<title>SHAFRAN</title>
<meta name="theme-color" content="#0b0a08">
<meta name="description" content="SHAFRAN — женские платки и аксессуары">

<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SHAFRAN">

<link rel="preconnect" href="https://res.cloudinary.com" crossorigin>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="image" href="/static/bg.jpg">

<style>
@font-face{
  font-family:'Fraunces';
  src:local('Fraunces');
  font-display:swap;
}
</style>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&display=swap" media="print" onload="this.media='all'">

<style>
:root{
  --bg:#0b0a08;
  --glass:rgba(255,255,255,.06);
  --glass-strong:rgba(255,255,255,.10);
  --glass-border:rgba(255,255,255,.14);
  --saffron:#e8a33d;
  --saffron-deep:#c9791b;
  --cream:#f5efe4;
  --muted:#a79a87;
  --danger:#e0684f;
  --radius:28px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{
  height:100%;
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
  overscroll-behavior-y:none;
}
body{
  margin:0;padding:0;min-height:100%;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,sans-serif;
  color:var(--cream);
  background:var(--bg);
  overflow-x:hidden;
  touch-action:manipulation;
  overscroll-behavior-y:none;
  -webkit-font-smoothing:antialiased;
}

/* ---------- фон: фиксированная картинка, не растягивается при скролле/зуме ---------- */
.bg{
  position:fixed;
  top:0;left:0;
  width:100vw;height:100dvh;
  z-index:-2;
  background:url('/static/bg.jpg') center/cover no-repeat, var(--bg);
  will-change:transform;
}
.bg::after{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(120% 80% at 50% -10%, rgba(11,10,8,.10), rgba(11,10,8,.35) 60%),
    linear-gradient(180deg, rgba(11,10,8,.15) 0%, rgba(11,10,8,.25) 40%, rgba(11,10,8,.55) 100%);
}

/* ---------- стеклянные карточки (liquid glass) ---------- */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  border-radius:var(--radius);
  backdrop-filter:blur(28px) saturate(160%);
  -webkit-backdrop-filter:blur(28px) saturate(160%);
  box-shadow:0 8px 32px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.12);
  position:relative;
  overflow:hidden;
}
.glass::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,255,255,.10), rgba(255,255,255,0) 40%);
  pointer-events:none;
}

/* ---------- шапка: логотип по центру + иконка входа справа, с размытием ---------- */
.topbar{
  position:sticky;top:0;z-index:30;
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  background:linear-gradient(180deg, rgba(11,10,8,.85) 0%, rgba(11,10,8,.55) 70%, rgba(11,10,8,0) 100%);
  backdrop-filter:blur(22px) saturate(160%);
  -webkit-backdrop-filter:blur(22px) saturate(160%);
}
.topbar-inner{
  max-width:560px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
}
.topbar-spacer{width:36px;flex-shrink:0;}
.topbar-logo{flex:1;display:flex;justify-content:center;}
.logo{height:32px;filter:drop-shadow(0 0 18px rgba(232,163,61,.4));}
.logo-fallback{
  font-family:'Fraunces',serif;font-weight:600;letter-spacing:.14em;
  font-size:19px;color:#000000;
}
.logo-fallback b{color:#000000;}

.profile-btn{
  width:36px;height:36px;border-radius:50%;flex-shrink:0;
  border:1px solid var(--glass-border);
  background:var(--glass-strong);
  display:flex;align-items:center;justify-content:center;
  color:var(--cream);cursor:pointer;
  transition:transform .15s ease, background .2s;
}
.profile-btn:active{transform:scale(.92);}
.profile-initial{font-size:14px;font-weight:700;color:var(--saffron);font-family:-apple-system,sans-serif;}

/* ---------- контейнеры ---------- */
.hidden{display:none!important;}
.main-scroll{width:100%;max-width:520px;margin:0 auto;padding:16px 18px calc(60px + var(--safe-bottom));}

.hello{text-align:center;padding:2px 0 18px;}
.hello .name{font-family:'Fraunces',serif;font-size:22px;font-weight:600;}
.hello .sub{color:var(--muted);font-size:13px;margin-top:2px;}

/* ---------- таймер ---------- */
.timer-card{padding:34px 20px 30px;text-align:center;margin-bottom:22px;}
.timer-label{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:14px;}
.timer-digits{
  font-family:'Fraunces',serif;font-weight:600;
  font-size:clamp(40px,12vw,64px);
  letter-spacing:.01em;line-height:1;
  color:var(--cream);
  text-shadow:0 0 40px rgba(232,163,61,.35);
}
.timer-digits .sep{color:var(--saffron);opacity:.7;margin:0 2px;}
.timer-sub{margin-top:12px;color:var(--muted);font-size:13px;}

.timer-card.live .timer-digits{animation:pulseGlow 2.4s ease-in-out infinite;}
@keyframes pulseGlow{
  0%,100%{text-shadow:0 0 40px rgba(232,163,61,.25);}
  50%{text-shadow:0 0 60px rgba(232,163,61,.55);}
}

.burst{
  position:absolute;inset:0;pointer-events:none;
  background:radial-gradient(circle at 50% 50%, rgba(232,163,61,.55), rgba(232,163,61,0) 60%);
  opacity:0;
}
.burst.play{animation:burstAnim 900ms ease-out;}
@keyframes burstAnim{
  0%{opacity:.9;transform:scale(.2);}
  100%{opacity:0;transform:scale(2.4);}
}

.claim-btn{margin-top:18px;}
.number-reveal{margin-top:18px;}
.number-reveal .big{
  font-family:'Fraunces',serif;font-weight:600;font-size:52px;color:var(--saffron);
  text-shadow:0 0 30px rgba(232,163,61,.5);
}
.number-reveal .cap{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.claimed-count{margin-top:14px;font-size:12px;color:var(--muted);}

/* ---------- каталог: masonry в стиле Pinterest ---------- */
.section-title{
  font-family:'Fraunces',serif;font-weight:600;font-size:20px;
  margin:6px 4px 14px;display:flex;align-items:baseline;justify-content:space-between;
}
.section-title span{font-size:12px;color:var(--muted);font-family:-apple-system,sans-serif;letter-spacing:.05em;text-transform:uppercase;}

.grid{display:flex;gap:14px;align-items:flex-start;}
.grid-col{display:flex;flex-direction:column;gap:14px;flex:1;min-width:0;}
.card{width:100%;}
.card .img-wrap{width:100%;overflow:hidden;background:rgba(255,255,255,.04);}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease;}
.card:active img{transform:scale(1.04);}
.card .info{padding:12px 14px 16px;}
.card .cname{font-size:14px;font-weight:600;color:var(--cream);}
.card .cdesc{font-size:12px;color:var(--muted);margin-top:3px;line-height:1.4;}
.badge{
  display:inline-block;margin-top:8px;font-size:10px;letter-spacing:.08em;text-transform:uppercase;
  padding:4px 9px;border-radius:20px;
}
.badge.in{background:rgba(232,163,61,.16);color:var(--saffron);}
.badge.out{background:rgba(255,255,255,.08);color:var(--muted);}

footer{text-align:center;color:var(--muted);font-size:11px;padding:26px 0 10px;letter-spacing:.04em;}

/* ---------- модалка входа ---------- */
.modal-overlay{
  position:fixed;inset:0;z-index:50;
  display:flex;align-items:center;justify-content:center;padding:24px;
  background:rgba(11,10,8,.65);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
}
.modal-card{width:100%;max-width:380px;padding:32px 26px 28px;text-align:center;position:relative;}
.modal-close{
  position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.08);border:none;color:var(--cream);
  font-size:18px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;
}
.modal-card h1{
  font-family:'Fraunces',serif;font-weight:600;font-size:26px;margin:6px 0 6px;
  letter-spacing:.01em;
}
.modal-card p{color:var(--muted);font-size:14px;margin:0 0 24px;line-height:1.5;}

.field{text-align:left;margin-bottom:14px;}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;letter-spacing:.03em;text-transform:uppercase;}
.field input{
  width:100%;padding:14px 16px;border-radius:16px;
  background:rgba(255,255,255,.07);
  border:1px solid var(--glass-border);
  color:var(--cream);font-size:16px;outline:none;
  transition:border-color .2s, background .2s;
}
.field input::placeholder{color:rgba(245,239,228,.35);}
.field input:focus{border-color:var(--saffron);background:rgba(255,255,255,.1);}

.btn{
  appearance:none;border:none;cursor:pointer;width:100%;
  padding:15px 20px;border-radius:18px;font-size:16px;font-weight:600;
  color:#1c1305;
  background:linear-gradient(135deg,var(--saffron),var(--saffron-deep));
  box-shadow:0 6px 24px rgba(232,163,61,.35);
  transition:transform .15s ease, box-shadow .15s ease, opacity .2s;
}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;}
.error-msg{color:var(--danger);font-size:13px;margin-top:10px;min-height:16px;}

/* ---------- утилиты ---------- */
.spinner{
  width:20px;height:20px;border-radius:50%;
  border:2px solid rgba(28,19,5,.35);border-top-color:#1c1305;
  animation:spin .7s linear infinite;display:inline-block;vertical-align:-4px;margin-right:8px;
}
@keyframes spin{to{transform:rotate(360deg);}}

/* ---------- дорогие плавные анимации ---------- */
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(22px);}
  to{opacity:1;transform:translateY(0);}
}
.hello, .timer-card{
  animation:fadeSlideUp .7s cubic-bezier(.16,1,.3,1) both;
}
.timer-card{animation-delay:.08s;}
.section-title{animation:fadeSlideUp .7s cubic-bezier(.16,1,.3,1) .16s both;}

.card{
  opacity:0;transform:translateY(28px) scale(.98);
  transition:opacity .7s cubic-bezier(.16,1,.3,1), transform .7s cubic-bezier(.16,1,.3,1);
}
.card.in-view{opacity:1;transform:translateY(0) scale(1);}

@keyframes numberPop{
  0%{opacity:0;transform:scale(.5);}
  60%{opacity:1;transform:scale(1.12);}
  100%{opacity:1;transform:scale(1);}
}
.number-reveal.pop .big{animation:numberPop .55s cubic-bezier(.34,1.56,.64,1) both;}

.modal-overlay{
  opacity:0;transition:opacity .25s ease;
}
.modal-overlay.open{opacity:1;}
.modal-card{
  transform:scale(.9) translateY(10px);opacity:0;
  transition:transform .35s cubic-bezier(.16,1,.3,1), opacity .3s ease;
}
.modal-overlay.open .modal-card{transform:scale(1) translateY(0);opacity:1;}

.profile-btn{transition:transform .2s cubic-bezier(.34,1.56,.64,1), background .2s;}
.claim-btn{transition:transform .15s ease, box-shadow .15s ease, opacity .2s;}

/* ---------- shimmer-плейсхолдер + blur-up для фото товаров ---------- */
.img-wrap{position:relative;}
.img-wrap::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(100deg, rgba(255,255,255,.03) 25%, rgba(255,255,255,.09) 45%, rgba(255,255,255,.03) 65%);
  background-size:200% 100%;
  animation:shimmer 1.6s ease-in-out infinite;
}
.img-wrap.loaded::before{display:none;}
.card img{opacity:0;transition:opacity .55s ease;}
.card img.loaded{opacity:1;}
@keyframes shimmer{
  0%{background-position:180% 0;}
  100%{background-position:-20% 0;}
}

/* ---------- ripple на кнопках ---------- */
.btn{position:relative;overflow:hidden;}
.ripple{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.55);
  transform:scale(0);opacity:.6;
  animation:rippleAnim .6s ease-out forwards;
  pointer-events:none;
}
@keyframes rippleAnim{to{transform:scale(2.8);opacity:0;}}

/* ---------- шафрановое конфетти при получении номера ---------- */
.confetti-piece{
  width:6px;height:11px;border-radius:2px;
  background:var(--saffron);
  opacity:0;pointer-events:none;
  animation:confettiFly .9s cubic-bezier(.2,.7,.3,1) forwards;
}
@keyframes confettiFly{
  0%{opacity:1;transform:translate(-50%,-50%) rotate(0deg);}
  100%{opacity:0;transform:translate(calc(-50% + var(--dx)), calc(-50% + var(--dy))) rotate(var(--rot));}
}

/* ---------- лёгкий пульс таймера при смене секунды ---------- */
.timer-digits.tick{animation:digitTick .35s ease;}
@keyframes digitTick{
  0%{transform:scale(1);}
  35%{transform:scale(1.035);}
  100%{transform:scale(1);}
}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important;}
}
</style>
</head>
<body>

<div class="bg"></div>

<header class="topbar">
  <div class="topbar-inner">
    <div class="topbar-spacer"></div>
    <div class="topbar-logo">
      <img src="/static/logo.png" class="logo" alt="SHAFRAN" onerror="this.style.display='none';document.getElementById('logoFallback').style.display='block';">
      <div id="logoFallback" class="logo-fallback" style="display:none">SH<b>A</b>FRAN</div>
    </div>
    <button id="profileBtn" class="profile-btn" type="button" aria-label="Войти в аккаунт">
      <svg id="profileIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
        <circle cx="12" cy="8" r="4"></circle>
        <path d="M4 20c0-4.4 3.6-7 8-7s8 2.6 8 7"></path>
      </svg>
      <span id="profileInitial" class="profile-initial hidden"></span>
    </button>
  </div>
</header>

<main class="main-scroll">

  <div class="hello hidden" id="helloBlock">
    <div class="name" id="helloName">—</div>
    <div class="sub">рады видеть вас в SHAFRAN</div>
  </div>

  <div class="timer-card glass" id="timerCard">
    <div class="burst" id="burst"></div>
    <div class="timer-label" id="timerLabel">до старта выдачи номеров</div>
    <div class="timer-digits" id="timerDigits">— : — : —</div>
    <div class="timer-sub" id="timerSub">ожидайте, скоро начнём</div>

    <button class="btn claim-btn hidden" id="claimBtn">Получить номер</button>

    <div class="number-reveal hidden" id="numberReveal">
      <div class="cap">ваш номер в очереди</div>
      <div class="big" id="numberBig">—</div>
    </div>

    <div class="claimed-count" id="claimedCount"></div>
  </div>

  <div class="section-title">Каталог <span id="catalogCount"></span></div>
  <div class="grid" id="catalogGrid"></div>

  <footer>SHAFRAN · сделано с любовью к деталям</footer>
</main>

<div id="authOverlay" class="modal-overlay hidden">
  <div class="modal-card glass">
    <button class="modal-close" id="modalClose" type="button" aria-label="Закрыть">×</button>
    <h1>Добро пожаловать</h1>
    <p>Войдите, чтобы участвовать в розыгрыше номеров</p>

    <form id="authForm" autocomplete="off">
      <div class="field">
        <label for="phone">Номер телефона</label>
        <input id="phone" type="tel" inputmode="tel" placeholder="+7 900 000-00-00" required>
      </div>
      <div class="field">
        <label for="firstName">Имя</label>
        <input id="firstName" type="text" placeholder="Ваше имя" required>
      </div>
      <div class="field">
        <label for="lastName">Фамилия</label>
        <input id="lastName" type="text" placeholder="Ваша фамилия" required>
      </div>
      <button class="btn" type="submit" id="authBtn">Войти</button>
      <div class="error-msg" id="authError"></div>
    </form>
  </div>
</div>

<script>
const API = "";
const state = {
  token: localStorage.getItem("shafran_token") || null,
  timerEnd: null,
  timerRunning: false,
  queueNumber: null,
  ws: null,
  countdownTimer: null,
  pendingClaim: false,
};

const profileBtn    = document.getElementById("profileBtn");
const profileIcon   = document.getElementById("profileIcon");
const profileInitial= document.getElementById("profileInitial");
const authOverlay   = document.getElementById("authOverlay");
const modalClose    = document.getElementById("modalClose");
const authForm      = document.getElementById("authForm");
const authBtn       = document.getElementById("authBtn");
const authError     = document.getElementById("authError");
const helloBlock    = document.getElementById("helloBlock");
const helloName     = document.getElementById("helloName");
const timerCard     = document.getElementById("timerCard");
const timerLabel    = document.getElementById("timerLabel");
const timerDigits   = document.getElementById("timerDigits");
const timerSub      = document.getElementById("timerSub");
const claimBtn      = document.getElementById("claimBtn");
const numberReveal  = document.getElementById("numberReveal");
const numberBig     = document.getElementById("numberBig");
const claimedCount  = document.getElementById("claimedCount");
const burst         = document.getElementById("burst");

// ---------- модалка входа ----------
function openAuth() {
  authError.textContent = "";
  authOverlay.classList.remove("hidden");
  requestAnimationFrame(() => requestAnimationFrame(() => authOverlay.classList.add("open")));
}
function closeAuth() {
  authOverlay.classList.remove("open");
  setTimeout(() => authOverlay.classList.add("hidden"), 250);
}
profileBtn.addEventListener("click", () => {
  if (state.token) return; // уже вошли — иконка просто показывает инициал
  openAuth();
});
modalClose.addEventListener("click", closeAuth);
authOverlay.addEventListener("click", (e) => { if (e.target === authOverlay) closeAuth(); });

authForm.addEventListener("submit", async (e) => {
  e.preventDefault();
  authError.textContent = "";
  authBtn.disabled = true;
  authBtn.innerHTML = '<span class="spinner"></span>Входим…';

  const phone = document.getElementById("phone").value.trim();
  const firstName = document.getElementById("firstName").value.trim();
  const lastName = document.getElementById("lastName").value.trim();

  try {
    const res = await fetch(`${API}/api/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ phone, first_name: firstName, last_name: lastName }),
    });
    if (!res.ok) throw new Error((await res.json()).detail || "Ошибка входа");
    const data = await res.json();

    localStorage.setItem("shafran_token", data.token);
    localStorage.setItem("shafran_name", `${data.first_name} ${data.last_name}`);
    state.token = data.token;
    state.queueNumber = data.queue_number;

    applyLoggedIn(data.first_name);
    closeAuth();

    if (state.pendingClaim) {
      state.pendingClaim = false;
      doClaim();
    }
  } catch (err) {
    authError.textContent = err.message || "Не удалось войти, попробуйте ещё раз";
  } finally {
    authBtn.disabled = false;
    authBtn.textContent = "Войти";
  }
});

function applyLoggedIn(firstName) {
  profileIcon.classList.add("hidden");
  profileInitial.classList.remove("hidden");
  profileInitial.textContent = (firstName || "?").trim().charAt(0).toUpperCase();
  helloBlock.classList.remove("hidden");
  helloName.textContent = firstName || localStorage.getItem("shafran_name") || "";
  if (state.queueNumber) showNumber(state.queueNumber);
}

// ---------- загрузка ----------
(async function boot() {
  connectWS();
  await refreshState();
  renderCatalog();

  if (!state.token) return;
  try {
    const res = await fetch(`${API}/api/me?token=${encodeURIComponent(state.token)}`);
    if (!res.ok) throw new Error();
    const me = await res.json();
    state.queueNumber = me.queue_number;
    applyLoggedIn(me.first_name);
  } catch {
    localStorage.removeItem("shafran_token");
    state.token = null;
  }
})();

// ---------- состояние / таймер ----------
async function refreshState() {
  try {
    const res = await fetch(`${API}/api/state`);
    const data = await res.json();
    applyState(data);
  } catch {
    timerSub.textContent = "нет соединения, повторяем попытку…";
  }
}

function applyState(data) {
  state.timerEnd = data.timer_end;
  state.timerRunning = data.timer_running;
  updateClaimedLabel(data.claimed_count);
  restartCountdownLoop();
}

function updateClaimedLabel(count) {
  if (typeof count === "number") {
    animateClaimedCount(lastClaimedShown, count);
    lastClaimedShown = count;
  }
}

function restartCountdownLoop() {
  if (state.countdownTimer) clearInterval(state.countdownTimer);
  tickCountdown();
  state.countdownTimer = setInterval(tickCountdown, 250);
}

function fmt(n){ return String(n).padStart(2,"0"); }

let lastTickSecond = null;
function pulseDigits(totalSec) {
  if (totalSec === lastTickSecond) return;
  lastTickSecond = totalSec;
  timerDigits.classList.remove("tick");
  void timerDigits.offsetWidth;
  timerDigits.classList.add("tick");
}

function tickCountdown() {
  if (!state.timerRunning || !state.timerEnd) {
    timerLabel.textContent = "до старта выдачи номеров";
    timerDigits.innerHTML = "— <span class='sep'>:</span> — <span class='sep'>:</span> —";
    timerSub.textContent = "ожидайте, скоро начнём";
    timerCard.classList.remove("live");
    claimBtn.classList.add("hidden");
    return;
  }

  const end = new Date(state.timerEnd).getTime();
  const diff = end - Date.now();

  if (diff > 0) {
    timerCard.classList.add("live");
    timerLabel.textContent = "до открытия розыгрыша номеров";
    const totalSec = Math.floor(diff / 1000);
    const h = Math.floor(totalSec / 3600);
    const m = Math.floor((totalSec % 3600) / 60);
    const s = totalSec % 60;
    timerDigits.innerHTML = `${fmt(h)}<span class="sep">:</span>${fmt(m)}<span class="sep">:</span>${fmt(s)}`;
    timerSub.textContent = "будьте рядом — как только время выйдет, появится кнопка";
    claimBtn.classList.add("hidden");
    pulseDigits(totalSec);
  } else {
    timerCard.classList.remove("live");
    timerLabel.textContent = "розыгрыш открыт";
    timerDigits.innerHTML = "00<span class='sep'>:</span>00<span class='sep'>:</span>00";

    if (state.queueNumber) {
      timerSub.textContent = "ваш номер уже закреплён";
      claimBtn.classList.add("hidden");
      showNumber(state.queueNumber);
    } else {
      timerSub.textContent = "жмите скорее — номера уходят по одному";
      claimBtn.classList.remove("hidden");
      claimBtn.disabled = false;
      claimBtn.textContent = "Получить номер";
      playBurstOnce();
    }
  }
}

let burstPlayed = false;
function playBurstOnce() {
  if (burstPlayed) return;
  burstPlayed = true;
  burst.classList.add("play");
  setTimeout(() => burst.classList.remove("play"), 950);
}

// ---------- получение номера ----------
claimBtn.addEventListener("click", async () => {
  if (!state.token) {
    state.pendingClaim = true;
    openAuth();
    return;
  }
  await doClaim();
});

async function doClaim() {
  claimBtn.disabled = true;
  claimBtn.innerHTML = '<span class="spinner"></span>Получаем номер…';
  try {
    const res = await fetch(`${API}/api/claim`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ token: state.token }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || "Не удалось получить номер");
    state.queueNumber = data.queue_number;
    showNumber(data.queue_number);
  } catch (err) {
    claimBtn.disabled = false;
    claimBtn.textContent = "Попробовать снова";
    timerSub.textContent = err.message;
  }
}

function showNumber(num) {
  claimBtn.classList.add("hidden");
  numberReveal.classList.remove("hidden");
  numberReveal.classList.remove("pop");
  numberBig.textContent = "№ " + num;
  void numberReveal.offsetWidth; // рестарт анимации
  numberReveal.classList.add("pop");
  spawnConfetti(timerCard);
  if (navigator.vibrate) navigator.vibrate([12, 40, 12]);
}

// ---------- websocket ----------
function connectWS() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  const ws = new WebSocket(`${proto}://${location.host}/ws`);
  state.ws = ws;

  ws.onmessage = (ev) => {
    try {
      const msg = JSON.parse(ev.data);
      if (msg.type === "timer_start") {
        state.timerEnd = msg.timer_end;
        state.timerRunning = true;
        burstPlayed = false;
        restartCountdownLoop();
      } else if (msg.type === "claimed_count") {
        updateClaimedLabel(msg.claimed_count);
      } else if (msg.type === "reset") {
        state.timerEnd = null;
        state.timerRunning = false;
        state.queueNumber = null;
        burstPlayed = false;
        numberReveal.classList.add("hidden");
        restartCountdownLoop();
      }
    } catch {}
  };

  ws.onclose = () => { setTimeout(connectWS, 2000); };
}

setInterval(() => { if (document.visibilityState === "visible") refreshState(); }, 20000);

// ---------- каталог: masonry, разные пропорции карточек ----------
const PRODUCTS = [
  { name: "Персик и шёлк", desc: "шёлковый платок ручной обработки края", img: "https://res.cloudinary.com/demo/image/upload/f_auto,q_auto,g_auto,c_fill,w_600,h_800/samples/ecommerce/leather-bag-gray.jpg", inStock: true, ar: "3/4" },
  { name: "Шафрановый закат", desc: "хлопок-шёлк, крупный принт", img: "https://res.cloudinary.com/demo/image/upload/f_auto,q_auto,g_auto,c_fill,w_600,h_600/samples/ecommerce/shoes.png", inStock: true, ar: "1/1" },
  { name: "Ночной сад", desc: "кашемировая смесь, тёмный тон", img: "https://res.cloudinary.com/demo/image/upload/f_auto,q_auto,g_auto,c_fill,w_600,h_750/samples/ecommerce/analog-classic.jpg", inStock: false, ar: "4/5" },
  { name: "Молочная роза", desc: "лёгкий шёлк, пастельный узор", img: "https://res.cloudinary.com/demo/image/upload/f_auto,q_auto,g_auto,c_fill,w_600,h_840/samples/ecommerce/accessories-bag.jpg", inStock: true, ar: "5/7" },
];

function renderCatalog() {
  const grid = document.getElementById("catalogGrid");
  const count = document.getElementById("catalogCount");
  count.textContent = `${PRODUCTS.length} моделей`;

  // настоящая masonry-раскладка: каждую карточку кладём в тот столбец,
  // который на данный момент короче — порядок предсказуем и стабилен,
  // в отличие от CSS column-count (который сначала заполняет весь левый
  // столбец, а потом правый, из-за чего карточки "скачут").
  const INFO_HEIGHT = 0.42; // условная высота текстового блока под фото
  const colHeights = [0, 0];
  const colItems = [[], []];

  PRODUCTS.forEach((p, i) => {
    const [w, h] = p.ar.split("/").map(Number);
    const imgHeight = h / w; // относительная высота при равной ширине столбцов
    const score = imgHeight + INFO_HEIGHT;

    const col = colHeights[0] <= colHeights[1] ? 0 : 1;
    colHeights[col] += score;
    colItems[col].push(`
      <div class="card glass" style="transition-delay:${i * 70}ms">
        <div class="img-wrap" style="aspect-ratio:${p.ar}"><img src="${p.img}" alt="${p.name}" loading="lazy" decoding="async"></div>
        <div class="info">
          <div class="cname">${p.name}</div>
          <div class="cdesc">${p.desc}</div>
          <span class="badge ${p.inStock ? 'in' : 'out'}">${p.inStock ? 'в наличии' : 'нет в наличии'}</span>
        </div>
      </div>
    `);
  });

  grid.innerHTML = colItems.map(items => `<div class="grid-col">${items.join("")}</div>`).join("");

  // blur-up: убираем shimmer и плавно проявляем фото после загрузки
  grid.querySelectorAll(".card img").forEach((img) => {
    const wrap = img.closest(".img-wrap");
    const markLoaded = () => { img.classList.add("loaded"); wrap.classList.add("loaded"); };
    if (img.complete && img.naturalWidth > 0) {
      markLoaded();
    } else {
      img.addEventListener("load", markLoaded, { once: true });
      img.addEventListener("error", markLoaded, { once: true }); // не залипаем на shimmer, если фото не загрузилось
    }
  });

  const cards = grid.querySelectorAll(".card");
  if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((entries) => {
      entries.forEach((entry) => {
        if (entry.isIntersecting) {
          entry.target.classList.add("in-view");
          io.unobserve(entry.target);
        }
      });
    }, { threshold: 0.15, rootMargin: "0px 0px -40px 0px" });
    cards.forEach((c) => io.observe(c));
  } else {
    cards.forEach((c) => c.classList.add("in-view"));
  }
}

// ---------- ripple-эффект на всех .btn ----------
document.addEventListener("pointerdown", (e) => {
  const btn = e.target.closest(".btn");
  if (!btn || btn.disabled) return;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height) * 1.2;
  const ripple = document.createElement("span");
  ripple.className = "ripple";
  ripple.style.width = ripple.style.height = size + "px";
  ripple.style.left = (e.clientX - rect.left - size / 2) + "px";
  ripple.style.top = (e.clientY - rect.top - size / 2) + "px";
  btn.appendChild(ripple);
  setTimeout(() => ripple.remove(), 650);
});

// ---------- шафрановое конфетти (поверх страницы, чтобы не обрезалось стеклом) ----------
function spawnConfetti(anchorEl) {
  const rect = anchorEl.getBoundingClientRect();
  const originX = rect.left + rect.width / 2;
  const originY = rect.top + rect.height * 0.35;

  for (let i = 0; i < 16; i++) {
    const piece = document.createElement("span");
    piece.className = "confetti-piece";
    const angle = Math.random() * Math.PI * 2;
    const dist = 70 + Math.random() * 90;
    piece.style.position = "fixed";
    piece.style.left = originX + "px";
    piece.style.top = originY + "px";
    piece.style.setProperty("--dx", `${Math.cos(angle) * dist}px`);
    piece.style.setProperty("--dy", `${Math.sin(angle) * dist}px`);
    piece.style.setProperty("--rot", `${(Math.random() * 360) - 180}deg`);
    piece.style.animationDelay = `${Math.random() * 80}ms`;
    piece.style.background = Math.random() > 0.5 ? "var(--saffron)" : "var(--saffron-deep)";
    piece.style.zIndex = "60";
    document.body.appendChild(piece);
    setTimeout(() => piece.remove(), 1100);
  }
}

// ---------- плавный счётчик выданных номеров ----------
let lastClaimedShown = 0;
function animateClaimedCount(from, to) {
  if (from === to) {
    claimedCount.textContent = to > 0 ? `номеров уже выдано: ${to}` : "";
    return;
  }
  const start = performance.now();
  const dur = 500;
  function step(now) {
    const t = Math.min((now - start) / dur, 1);
    const eased = 1 - Math.pow(1 - t, 3);
    const val = Math.round(from + (to - from) * eased);
    claimedCount.textContent = val > 0 ? `номеров уже выдано: ${val}` : "";
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
(function initParallax() {
  const bg = document.querySelector(".bg");
  if (!bg || window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;
  let ticking = false;
  function onScroll() {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      const offset = Math.min(window.scrollY * 0.06, 40); // ограничено, фон не "уезжает"
      bg.style.transform = `translate3d(0, ${offset}px, 0)`;
      ticking = false;
    });
  }
  window.addEventListener("scroll", onScroll, { passive: true });
})();

// ---------- PWA ----------
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js").catch(() => {});
  });
}
